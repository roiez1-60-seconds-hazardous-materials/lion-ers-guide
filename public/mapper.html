<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כלי מיפוי רכיבים</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:sans-serif;background:#f5f5f5;padding:20px;direction:rtl}
h2{text-align:center;margin-bottom:10px}
p{text-align:center;color:#666;margin-bottom:16px;font-size:14px}
.container{position:relative;max-width:600px;margin:0 auto;cursor:crosshair}
.container img{width:100%;display:block;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.1)}
.marker{position:absolute;width:20px;height:20px;border-radius:50%;background:rgba(192,57,43,.3);border:3px solid #C0392B;transform:translate(-50%,-50%);pointer-events:none;z-index:2}
.marker span{position:absolute;top:-24px;left:50%;transform:translateX(-50%);background:#C0392B;color:#fff;font-size:11px;padding:2px 8px;border-radius:4px;white-space:nowrap;font-weight:700}
#log{max-width:600px;margin:20px auto;background:#fff;border-radius:12px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);max-height:400px;overflow-y:auto}
.log-item{display:flex;justify-content:space-between;align-items:center;padding:8px 12px;border-bottom:1px solid #eee;font-size:14px}
.log-item:last-child{border:none}
.log-num{background:#C0392B;color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;flex-shrink:0}
.log-coords{font-family:monospace;font-size:14px;color:#333;direction:ltr}
.log-name{flex:1;margin:0 12px}
.log-name input{border:1px solid #ddd;border-radius:6px;padding:4px 8px;font-size:13px;width:100%;font-family:sans-serif}
.btn{display:inline-flex;align-items:center;gap:6px;padding:10px 20px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;border:none;margin:4px}
.btn-red{background:#C0392B;color:#fff}
.btn-gray{background:#eee;color:#333}
.btn-green{background:#16A34A;color:#fff}
#output{max-width:600px;margin:16px auto;background:#1a1a1a;color:#0f0;border-radius:12px;padding:16px;font-family:monospace;font-size:12px;display:none;direction:ltr;white-space:pre-wrap;line-height:1.8}
.actions{text-align:center;margin:16px 0}
</style>
</head>
<body>
<h2>🎯 כלי מיפוי רכיבים על התמונה</h2>
<p>לחץ על כל רכיב בתמונה ותן לו שם. בסוף לחץ "ייצא קוד".</p>

<div class="container" id="imgContainer">
<img src="images/suit-components.png" alt="רכיבי חליפה" id="suitImg">
</div>

<div class="actions">
<button class="btn btn-gray" onclick="undoLast()">↩ בטל אחרון</button>
<button class="btn btn-red" onclick="clearAll()">🗑 נקה הכל</button>
<button class="btn btn-green" onclick="exportCode()">📋 ייצא קוד</button>
</div>

<div id="log"></div>
<div id="output"></div>

<script>
const container = document.getElementById('imgContainer');
const log = document.getElementById('log');
const markers = [];
let count = 0;

container.addEventListener('click', function(e) {
  const rect = container.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
  const y = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
  
  count++;
  
  // Add marker on image
  const marker = document.createElement('div');
  marker.className = 'marker';
  marker.style.left = x + '%';
  marker.style.top = y + '%';
  marker.innerHTML = '<span>' + count + '</span>';
  container.appendChild(marker);
  
  // Add to log
  const item = document.createElement('div');
  item.className = 'log-item';
  item.innerHTML = `
    <div class="log-num">${count}</div>
    <div class="log-name"><input type="text" placeholder="שם הרכיב..." id="name${count}" autofocus></div>
    <div class="log-coords">left:${x}% top:${y}%</div>
  `;
  log.appendChild(item);
  
  markers.push({ num: count, x, y, marker, item });
  
  // Focus the name input
  setTimeout(() => document.getElementById('name' + count).focus(), 50);
});

function undoLast() {
  if (markers.length === 0) return;
  const last = markers.pop();
  last.marker.remove();
  last.item.remove();
  count--;
}

function clearAll() {
  markers.forEach(m => { m.marker.remove(); m.item.remove(); });
  markers.length = 0;
  count = 0;
  document.getElementById('output').style.display = 'none';
}

function exportCode() {
  const out = document.getElementById('output');
  let code = '';
  markers.forEach(m => {
    const name = document.getElementById('name' + m.num)?.value || 'רכיב ' + m.num;
    code += `נקודה ${m.num}: "${name}" → left:${m.x}% top:${m.y}%\n`;
  });
  code += '\n--- העתק ושלח לי את הטקסט הזה ---';
  out.textContent = code;
  out.style.display = 'block';
  out.scrollIntoView({ behavior: 'smooth' });
  
  // Also copy to clipboard
  navigator.clipboard?.writeText(code).then(() => {
    alert('הועתק! שלח לי את הטקסט');
  });
}
</script>
</body>
</html>
